<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560" role="img" aria-labelledby="title desc">
  <title id="title">Volume Uplift</title>
  <desc id="desc">Simplified editable bar chart showing monthly volume index with and without privacy layer.</desc>
  <defs>
    <style>
      .bg { fill: #fff; }
      .title { font: 700 28px Arial, sans-serif; fill: #111827; }
      .axis { stroke: #1f2937; stroke-width: 2; }
      .grid { stroke: #e5e7eb; stroke-width: 1; }
      .tick { font: 12px Arial, sans-serif; fill: #6b7280; }
      .label { font: 600 14px Arial, sans-serif; fill: #374151; }
      .legend { font: 14px Arial, sans-serif; fill: #111827; }
      .value { font: 700 13px Arial, sans-serif; fill: #111827; }
      .without { fill: #cbd5e1; }
      .with { fill: #22c55e; }
    </style>
  </defs>

  <rect class="bg" width="900" height="560"/>
  <text class="title" x="64" y="52">Volume Uplift</text>

  <g transform="translate(610 34)">
    <rect class="without" x="0" y="0" width="18" height="18" rx="4"/>
    <text class="legend" x="28" y="14">Without privacy</text>
    <rect class="with" x="0" y="30" width="18" height="18" rx="4"/>
    <text class="legend" x="28" y="44">With privacy</text>
  </g>

  <!-- Chart bounds: left=110 top=105 width=700 height=330 max=160 -->
  <g transform="translate(110 105)">
    <line class="grid" x1="0" y1="330" x2="700" y2="330"/>
    <line class="grid" x1="0" y1="247.5" x2="700" y2="247.5"/>
    <line class="grid" x1="0" y1="165" x2="700" y2="165"/>
    <line class="grid" x1="0" y1="82.5" x2="700" y2="82.5"/>
    <line class="grid" x1="0" y1="0" x2="700" y2="0"/>
    <line class="axis" x1="0" y1="330" x2="700" y2="330"/>
    <line class="axis" x1="0" y1="0" x2="0" y2="330"/>

    <text class="tick" x="-30" y="334">0</text>
    <text class="tick" x="-38" y="252">40</text>
    <text class="tick" x="-38" y="169">80</text>
    <text class="tick" x="-46" y="87">120</text>
    <text class="tick" x="-46" y="4">160</text>

    <!-- scale 330/160 = 2.0625 -->
    <rect class="without" x="110" y="292.875" width="58" height="37.125" rx="6"/>
    <rect class="with" x="184" y="278.438" width="58" height="51.563" rx="6"/>
    <text class="value" x="131" y="284">18</text>
    <text class="value" x="205" y="269">25</text>
    <text class="label" x="104" y="366">Micro tools</text>

    <rect class="without" x="330" y="237.188" width="58" height="92.813" rx="6"/>
    <rect class="with" x="404" y="160.875" width="58" height="169.125" rx="6"/>
    <text class="value" x="351" y="228">45</text>
    <text class="value" x="425" y="152">82</text>
    <text class="label" x="310" y="366">Research/data</text>

    <rect class="without" x="550" y="243.375" width="58" height="86.625" rx="6"/>
    <rect class="with" x="624" y="51.563" width="58" height="278.438" rx="6"/>
    <text class="value" x="571" y="234">42</text>
    <text class="value" x="641" y="43">135</text>
    <text class="label" x="516" y="366">Trading/security</text>
  </g>

  <text class="label" transform="translate(30 315) rotate(-90)">Monthly volume index</text>
</svg>
