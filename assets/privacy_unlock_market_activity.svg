<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Privacy Unlock for Agent-Agent Market Activity</title>
  <desc id="desc">Illustrative chart showing that privacy payment layers may have modest impact on micro tools, moderate impact on research services, and larger impact on high-value sensitive services such as trading and security intelligence.</desc>
  <defs>
    <style>
      .bg { fill: #fff; }
      .title { font: 700 30px Inter, Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 16px Inter, Arial, sans-serif; fill: #4b5563; }
      .axis { stroke: #1f2937; stroke-width: 2; }
      .grid { stroke: #e5e7eb; stroke-width: 1; }
      .tick { font: 12px Inter, Arial, sans-serif; fill: #6b7280; }
      .label { font: 600 15px Inter, Arial, sans-serif; fill: #374151; }
      .legend { font: 14px Inter, Arial, sans-serif; fill: #111827; }
      .note { font: 13px Inter, Arial, sans-serif; fill: #4b5563; }
      .formula { font: 600 15px Consolas, Menlo, monospace; fill: #111827; }
      .without { fill: #cbd5e1; }
      .with { fill: #22c55e; }
      .highlight { fill: #ecfdf5; stroke: #86efac; stroke-width: 1.5; rx: 12; }
      .callout { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.5; rx: 12; }
      .arrow { stroke: #16a34a; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="760"/>
  <text class="title" x="72" y="58">Privacy Unlock for Agent-Agent Market Activity</text>
  <text class="subtitle" x="72" y="86">x402 micro-tools prove the payment loop; privacy expands the addressable pool toward higher-value sensitive services.</text>

  <!-- Chart bounds: left 90 top 135 width 730 height 430, y max 120 -->
  <g id="grid">
    <line class="grid" x1="90" y1="565" x2="820" y2="565"/>
    <line class="grid" x1="90" y1="493.333" x2="820" y2="493.333"/>
    <line class="grid" x1="90" y1="421.667" x2="820" y2="421.667"/>
    <line class="grid" x1="90" y1="350" x2="820" y2="350"/>
    <line class="grid" x1="90" y1="278.333" x2="820" y2="278.333"/>
    <line class="grid" x1="90" y1="206.667" x2="820" y2="206.667"/>
    <line class="grid" x1="90" y1="135" x2="820" y2="135"/>
  </g>

  <line class="axis" x1="90" y1="565" x2="820" y2="565"/>
  <line class="axis" x1="90" y1="135" x2="90" y2="565"/>

  <!-- Y ticks -->
  <text class="tick" x="62" y="569">0</text>
  <text class="tick" x="53" y="497">20</text>
  <text class="tick" x="53" y="426">40</text>
  <text class="tick" x="53" y="354">60</text>
  <text class="tick" x="53" y="283">80</text>
  <text class="tick" x="45" y="211">100</text>
  <text class="tick" x="45" y="139">120</text>

  <text class="label" transform="translate(28 430) rotate(-90)">Monthly activity index</text>
  <text class="label" x="310" y="630">Service tier</text>

  <!-- Bars max 120, height per unit 3.5833 -->
  <!-- Micro: x center 205, without 18 h64.5, with 20 h71.7 -->
  <rect class="without" x="150" y="500.5" width="48" height="64.5" rx="6"/>
  <rect class="with" x="212" y="493.3" width="48" height="71.7" rx="6"/>
  <text class="legend" x="149" y="594">Micro tools</text>
  <text class="tick" x="154" y="492">18</text>
  <text class="tick" x="217" y="485">20</text>

  <!-- Research: center 455, without 32 h114.7, with 46 h164.8 -->
  <rect class="without" x="400" y="450.3" width="48" height="114.7" rx="6"/>
  <rect class="with" x="462" y="400.2" width="48" height="164.8" rx="6"/>
  <text class="legend" x="387" y="594">Research/data</text>
  <text class="tick" x="404" y="442">32</text>
  <text class="tick" x="466" y="392">46</text>

  <!-- Trading/security: center 705, without 22 h78.8, with 58 h207.9 -->
  <rect class="without" x="650" y="486.2" width="48" height="78.8" rx="6"/>
  <rect class="with" x="712" y="357.1" width="48" height="207.9" rx="6"/>
  <text class="legend" x="630" y="594">Trading/security</text>
  <text class="tick" x="655" y="478">22</text>
  <text class="tick" x="717" y="349">58</text>

  <!-- Legend -->
  <g transform="translate(870 145)">
    <rect class="without" x="0" y="0" width="22" height="22" rx="5"/>
    <text class="legend" x="34" y="17">Without privacy payment layer</text>
    <rect class="with" x="0" y="40" width="22" height="22" rx="5"/>
    <text class="legend" x="34" y="57">With privacy payment layer</text>
  </g>

  <!-- Formula card -->
  <g transform="translate(870 245)">
    <rect class="callout" x="0" y="0" width="275" height="158"/>
    <text class="label" x="16" y="28">Reference model</text>
    <text class="formula" x="16" y="58">Activity = N × C × P × T</text>
    <text class="note" x="16" y="88">N: agents willing to transact</text>
    <text class="note" x="16" y="110">C: calls per agent</text>
    <text class="note" x="16" y="132">P: average ticket</text>
    <text class="note" x="16" y="154">T: trust / privacy conversion</text>
  </g>

  <!-- Highlight card -->
  <g transform="translate(870 440)">
    <rect class="highlight" x="0" y="0" width="275" height="112"/>
    <text class="label" x="16" y="28">Main claim</text>
    <text class="note" x="16" y="56">Privacy has modest impact on cheap tools,</text>
    <text class="note" x="16" y="78">but can unlock higher-ticket services</text>
    <text class="note" x="16" y="100">where payment trails leak intent.</text>
  </g>

  <!-- Arrow annotation -->
  <path class="arrow" d="M765 370 C820 330, 835 310, 868 292"/>
  <text class="note" x="636" y="326">larger uplift in sensitive services</text>

  <text class="note" x="90" y="700">Illustrative pseudo-data, not empirical market sizing. The model extrapolates from low-cost x402 paid tools toward higher-value agent-agent services where safety, reputation, validation, and privacy are adoption blockers.</text>
</svg>
