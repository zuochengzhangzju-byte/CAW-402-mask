<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="680" viewBox="0 0 1000 680" role="img" aria-labelledby="title desc">
  <title id="title">Privacy Unlock: Volume Uplift for High-Value Sensitive Services</title>
  <desc id="desc">Illustrative chart showing that privacy can increase transaction volume for high-value trading, research, and security services by reducing intent-leakage risk.</desc>
  <defs>
    <style>
      .bg { fill: #fff; }
      .title { font: 700 28px Inter, Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 15px Inter, Arial, sans-serif; fill: #4b5563; }
      .axis { stroke: #1f2937; stroke-width: 2; }
      .grid { stroke: #e5e7eb; stroke-width: 1; }
      .tick { font: 12px Inter, Arial, sans-serif; fill: #6b7280; }
      .label { font: 600 14px Inter, Arial, sans-serif; fill: #374151; }
      .legend { font: 14px Inter, Arial, sans-serif; fill: #111827; }
      .note { font: 13px Inter, Arial, sans-serif; fill: #4b5563; }
      .formula { font: 600 14px Consolas, Menlo, monospace; fill: #111827; }
      .without { fill: #cbd5e1; }
      .with { fill: #22c55e; }
      .callout { fill: #ecfdf5; stroke: #86efac; stroke-width: 1.5; rx: 12; }
    </style>
  </defs>

  <rect class="bg" width="1000" height="680"/>
  <text class="title" x="64" y="54">Privacy Unlock: Volume Uplift</text>
  <text class="subtitle" x="64" y="82">High-value services are less frequent but more sensitive. Privacy can decide whether agents transact at all.</text>

  <g transform="translate(690 54)">
    <rect class="without" x="0" y="0" width="24" height="24" rx="5"/>
    <text class="legend" x="34" y="18">Without privacy layer</text>
    <rect class="with" x="0" y="36" width="24" height="24" rx="5"/>
    <text class="legend" x="34" y="54">With privacy layer</text>
  </g>

  <!-- Chart bounds: left 90 top 135 width 760 height 370 max 160 -->
  <g transform="translate(90 135)">
    <line class="grid" x1="0" y1="370" x2="760" y2="370"/>
    <line class="grid" x1="0" y1="277.5" x2="760" y2="277.5"/>
    <line class="grid" x1="0" y1="185" x2="760" y2="185"/>
    <line class="grid" x1="0" y1="92.5" x2="760" y2="92.5"/>
    <line class="grid" x1="0" y1="0" x2="760" y2="0"/>
    <line class="axis" x1="0" y1="370" x2="760" y2="370"/>
    <line class="axis" x1="0" y1="0" x2="0" y2="370"/>

    <text class="tick" x="-30" y="374">0</text>
    <text class="tick" x="-38" y="282">40</text>
    <text class="tick" x="-38" y="189">80</text>
    <text class="tick" x="-46" y="97">120</text>
    <text class="tick" x="-46" y="4">160</text>

    <!-- scale 370/160=2.3125 -->
    <rect class="without" x="120" y="328.375" width="64" height="41.625" rx="8"/>
    <rect class="with" x="204" y="312.188" width="64" height="57.813" rx="8"/>
    <text class="tick" x="141" y="319">18</text>
    <text class="tick" x="225" y="303">25</text>
    <text class="legend" x="120" y="405">Micro tools</text>

    <rect class="without" x="348" y="265.938" width="64" height="104.063" rx="8"/>
    <rect class="with" x="432" y="180.375" width="64" height="189.625" rx="8"/>
    <text class="tick" x="369" y="257">45</text>
    <text class="tick" x="453" y="171">82</text>
    <text class="legend" x="335" y="405">Research/data</text>

    <rect class="without" x="576" y="272.875" width="64" height="97.125" rx="8"/>
    <rect class="with" x="660" y="57.813" width="64" height="312.188" rx="8"/>
    <text class="tick" x="597" y="264">42</text>
    <text class="tick" x="676" y="49">135</text>
    <text class="legend" x="550" y="405">Trading/security</text>
  </g>

  <text class="label" x="365" y="575">Monthly volume index</text>

  <g transform="translate(64 600)">
    <rect class="callout" x="0" y="0" width="872" height="56"/>
    <text class="formula" x="18" y="24">Volume = Activity × Average ticket</text>
    <text class="note" x="18" y="44">High-ticket services gain more liquidity when privacy lowers intent-leakage and strategy-exposure risk.</text>
  </g>
</svg>
